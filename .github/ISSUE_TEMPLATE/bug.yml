name: Bug report
description: Report something that doesn't work as documented
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can — incomplete reports take longer to resolve.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: open-codesign version
      placeholder: "0.x.y or commit sha"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model provider used (if relevant)
      placeholder: "Anthropic / OpenAI / Gemini / DeepSeek / OpenRouter / local"
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Drag images here. For logs, paste in fenced code blocks.
