name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Check GitHub Action runtimes
        run: node .github/scripts/check-action-node24.mjs

      - name: Install
        run: vp install --frozen-lockfile

      - name: Check
        run: vp check

      - name: Test
        run: vp test

  dco:
    name: DCO check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by lines
        run: |
          git log --no-merges --format='%B' origin/${{ github.base_ref }}..HEAD \
            | grep -q 'Signed-off-by:' \
            || (echo 'Missing Signed-off-by. Run: git commit -s' && exit 1)
